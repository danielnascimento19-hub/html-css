<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * {
            height: 100%;
        }
        body { /* Configurações globais das CSS */
            background-image: linear-gradient(-45deg, #3198e2, #6d59c0, #e33f5f, #fdd579); /* to bottom (para baixo), to top (para cima), to right (da esquerda para a direita), to left (da direita para a esquerda). Podemos também fazer o degradê em angulos ((angulo)deg */
        }
    </style>
</head>
<body>
    <h1>Testando Gradiente</h1>
</body>
</html>
